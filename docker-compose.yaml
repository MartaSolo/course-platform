services:
  app:
    container_name: course-platform-dev-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
    develop:
      watch:
        - path: ./app
          target: /app/app
          action: sync
        - path: ./server
          target: /app/server
          action: sync
        - path: ./package.json
          action: rebuild
        - path: ./nuxt.config.ts
          action: rebuild
        - path: ./shared
          target: /app/shared
          action: sync
        - path: ./public
          target: /app/public
          action: sync
        - path: ./prisma
          target: /app/prisma
          action: sync
